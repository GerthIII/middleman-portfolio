- name: Pokeclo
  emoji: "&#129509;"
  icon_image: projects/pokeclo-logo.png
  description: Take Your Closet Anywhere! Pokeclo is an AI powered mobile first web app to build outfits in the store with clothes from your real closet. Built by a team of four as the Final Project at Le Wagon's AI Web Dev Bootcamp.
  image: projects/pokeclo-logo.png
  card_image: projects/pokeclo-card.png
  phone_image: projects/pokeclo-phone.png
  url: https://www.pokeclo.online
  github: https://github.com/GerthIII/pokeclo
  online: true
  team_role: Lead developer
  video_url: https://www.youtube.com/embed/HPa0-5nrqKw
  video_orientation: vertical
  video_description: Mobile walkthrough of the outfit builder
  recognition:
    icon: "&#127942;"
    title: Featured on Le Wagon's Global Showcase
    subtitle: One of ~100 graduate projects selected from over 30,000 Le Wagon alumni worldwide.
    cta: View on Le Wagon
    url: https://projects.lewagon.com/projects/pokeclo
  tech:
    - { name: Ruby, icon: "devicon-ruby-plain" }
    - { name: Rails, icon: "devicon-rails-plain" }
    - { name: PostgreSQL, icon: "devicon-postgresql-plain" }
    - { name: Stimulus, icon: "devicon-javascript-plain" }
    - { name: Bootstrap, icon: "devicon-bootstrap-plain" }
    - { name: SCSS, icon: "devicon-sass-original" }
  overview: |
    Pokeclo is the digital home for your wardrobe, designed to make looking good feel entirely effortless. It’s for the days you’re staring at a full closet feeling like you have nothing to wear, or the moments you’re stuck in a loop of the same three outfits. By turning your physical clothes into a smart, digital library, Pokeclo hands the creative heavy lifting over to an AI stylist that knows your taste. It learns what you love and builds fresh, ready-to-wear looks so you don’t have to.

    Even when you're out shopping, the guesswork is gone—just a quick scan of a new item shows you exactly how it fits into your current collection before you even reach the checkout. It’s not just an app; it’s the confidence of a professional stylist, tucked right in your pocket.

  role_image: projects/pokeclo-team.jpg
  # Describe what you did on the team — your responsibilities, the parts you owned, collaboration style, etc.
  role: |
    Pokeclo was built over a period of 10 days as the final product sprint for the Le Wagon Bootcamp. I served my team as the Lead Dev by organizing each morning's stand up meeting, and driving the technical and creative direction of the app. I was also in charge of implementing Pokeclo's AI features. 
  features:
    - title: AI Clothing Analyzer
      description: Implemented an intelligent wardrobe digitizer that uses Computer Vision to extract garment metadata from user photos. By automating the transition from image to structured data, I reduced manual input by 80% and enabled an AI-driven recommendation engine to instantly generate outfits by pairing the new item with the existing PostgreSQL-stored wardrobe.
      image: projects/pokeclo-feature-1.mp4
    - title: AI Outfit Builder
      description: Developed a Slot-Based Recommendation Engine that assembles cohesive outfits by querying categorized wardrobe data. By integrating an LLM-driven narrative layer, the app provides users with a professional 'Styling Rationale' for every suggestion, explaining the visual and textural synergy behind each garment choice to help users learn the principles of fashion as they use the app.
      image: projects/pokeclo-feature-2.mp4
    - title: Digital Fitting Room
      description: This allows you to see what the outfit looks like on you so you can be sure you like it! By passing your base photo and the recommended clothing items to Google's Gemini, we use its Nanobanana tool to digitally dress you in the outfit you just made. If you're in the store and can't make a decision, this feature is sure to make the decision a no-brainer! 
      image: projects/AI-tryon.png

- name: AI Team Planner
  emoji: "&#129302;"
  description: Built by a team of four as part of the AI Week Project at Le Wagon's AI Web Dev Bootcamp. We build the team so you can stop wasting time and start playing!
  image: projects/AI_Team_Planner.png
  card_image: projects/AI_Team_Planner_card.png
  url: https://www.poke-adventure-planner.site
  github: https://github.com/GerthIII/pokemon-adventure-planner
  online: true
  team_role: Lead developer
  video_url: https://www.youtube.com/embed/pbBK3yNYeFs
  video_orientation: horizontal
  video_description: Desktop demo of the team builder chatbot
  tech:
    - { name: Ruby, icon: "devicon-ruby-plain" }
    - { name: Rails, icon: "devicon-rails-plain" }
    - { name: PostgreSQL, icon: "devicon-postgresql-plain" }
    - { name: Stimulus, icon: "devicon-javascript-plain" }
    - { name: Bootstrap, icon: "devicon-bootstrap-plain" }
    - { name: SCSS, icon: "devicon-sass-original" }
  overview: |
    A web-application with a built in chatbot for creating teams of fictional characters for both newcomers and long-time fans. Our AI Team Planner was built over a period of 5 days as a product sprint during the Le Wagon Bootcamp. This was our first time leveraging AI in a web app and was a great opportunity for us to prepare for our final project, Pokeclo.
  role_image: projects/pokeclo-team.jpg
  role: |
    Took the project from empty repo to a deployed app. Cloned and configured the Rails template, scaffolded Devise for user authentication, worked with the team to scope the feature set, planned the route map, and wired each route through to its controller and view. Handled the operational side end-to-end — registered the domain, deployed to Heroku, and debugged production issues through launch.
  features:
    - title: Team Builder
      description: |
        
        Since this was our first time working together as a team, I spent a lot of my time coaching, and setting expectations. I actually found myself coaching more than coding at first, so I had to learn how to delegate tasks effectively to make sure I was also hitting my own technical goals.  When I hit walls I made sure to ask for help early so as not to waste time, and set the example for my team. It was a constant balance of managing our growth while implementing the logic the app needed to actually work.

        For the team management features, I followed a standard MVC pattern to build out the CRUD actions, using a simple form partial for the views to keep things dry. The technical core relied on a many to many association between Teams and Pokemon. I set up the UI with six slots using select tag to pass an array of pokemon ids, which let the Rails association auto-syncing handle the TeamMember join records automatically. This was crucial for getting the data ready for the AI to make recommendations based on our JSON seed data.
        
      image: projects/ai-team-planner-feature-1.mp4

