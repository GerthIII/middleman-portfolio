- name: Pokeclo
  emoji: "&#129509;"
  icon_image: projects/pokeclo-logo.png
  description: An AI powered mobile first web app to build outfits in the store with clothes from your real closet.
  image: projects/pokeclo-logo.png
  card_image: projects/pokeclo-card.png
  phone_image: projects/pokeclo-phone.png
  url: https://www.pokeclo.online
  github: https://github.com/GerthIII/pokeclo
  online: true
  team_role: Lead developer
  video_url: https://www.youtube.com/embed/HPa0-5nrqKw
  video_orientation: vertical
  video_description: Mobile walkthrough of the outfit builder
  recognition:
    icon: "&#127942;"
    title: Featured on Le Wagon's Global Showcase
    subtitle: One of ~100 graduate projects selected from over 30,000 Le Wagon alumni worldwide.
    cta: View on Le Wagon
    url: https://projects.lewagon.com/projects/pokeclo
  tech:
    - { name: Ruby, icon: "devicon-ruby-plain" }
    - { name: Rails, icon: "devicon-rails-plain" }
    - { name: PostgreSQL, icon: "devicon-postgresql-plain" }
    - { name: Stimulus, icon: "devicon-javascript-plain" }
    - { name: Bootstrap, icon: "devicon-bootstrap-plain" }
    - { name: SCSS, icon: "devicon-sass-original" }
  overview: |
    Pokeclo is the digital home for your wardrobe, designed to make looking good feel entirely effortless. It’s for the days you’re staring at a full closet feeling like you have nothing to wear, or the moments you’re stuck in a loop of the same three outfits. By turning your physical clothes into a smart, digital library, Pokeclo hands the creative heavy lifting over to an AI stylist that knows your taste. It learns what you love and builds fresh, ready-to-wear looks so you don’t have to.

    Even when you're out shopping, the guesswork is gone—just a quick scan of a new item shows you exactly how it fits into your current collection before you even reach the checkout. It’s not just an app; it’s the confidence of a professional stylist, tucked right in your pocket.

  role_image: projects/pokeclo-team.jpg
  # Describe what you did on the team — your responsibilities, the parts you owned, collaboration style, etc.
  role: |
    Pokeclo was built over a period of 10 days as the final product sprint for the Le Wagon Bootcamp. I served my team as the Lead Dev by organizing each morning's stand up meeting, and driving the technical and creative direction of the app. I was also in charge of implementing Pokeclo's AI features. 
